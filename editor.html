<!DOCTYPE html>
<html lang="he" dir="rtl">
<body>
    <h2>עורך שלבים פנימי</h2>
    כמות משבצות: <input type="number" id="size" value="10">
    <button onclick="createEditor()">צור לוח</button>
    <div id="grid" style="display:grid; gap:1px; background:#000; margin:20px 0;"></div>
    <button onclick="exportLevel()">ייצא קוד</button>
    <p>הקוד שלך (העתק ל-levels.js):</p>
    <textarea id="output" style="width:100%; height:100px;"></textarea>

    <script>
        function createEditor() {
            const size = document.getElementById('size').value;
            const grid = document.getElementById('grid');
            grid.style.gridTemplateColumns = `repeat(${size}, 30px)`;
            grid.innerHTML = '';
            for(let i=0; i<size*size; i++) {
                const div = document.createElement('div');
                div.style.width = '30px'; div.style.height = '30px'; div.style.background = '#fff';
                div.onclick = () => div.style.background = div.style.background === 'rgb(255, 255, 255)' ? '#000' : '#fff';
                grid.appendChild(div);
            }
        }
        function exportLevel() {
            const cells = document.getElementById('grid').children;
            let res = "";
            for(let c of cells) res += (c.style.background === 'rgb(0, 0, 0)' ? '1' : '0');
            document.getElementById('output').value = res;
        }
    </script>
</body>
</html>
