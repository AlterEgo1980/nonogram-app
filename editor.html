<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Nonogram Pro - Drag & Paint Editor</title>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --panel: #ffffff; --success: #16a34a; --danger: #dc2626; --warning: #f59e0b; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: var(--panel); padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 1400px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .setup-bar { display: flex; gap: 15px; align-items: flex-end; background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.85rem; font-weight: bold; color: #475569; }
        input, textarea { border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px; font-family: inherit; }
        #grid-container { display: grid; gap: 0; margin: 0 auto; border: 2px solid #1e293b; background: #fff; user-select: none; }
        .cell { width: 100%; aspect-ratio: 1/1; border: 0.5px solid #cbd5e1; cursor: pointer; position: relative; box-sizing: border-box; }
        .cell.black { background: #1e293b; border-color: #000; }
        .cell.solved-black::after { content: ''; position: absolute; width: 30%; height: 30%; background: rgba(22, 163, 74, 0.7); border-radius: 50%; top: 35%; left: 35%; }
        .cell.solved-x::after { content: '×'; position: absolute; width: 100%; height: 100%; top:0; left:0; display: flex; align-items: center; justify-content: center; color: rgba(220, 38, 38, 0.4); font-size: 1.2rem; font-weight: bold; }
        .editor-area { display: flex; gap: 25px; align-items: flex-start; }
        textarea { height: 400px; font-family: 'Courier New', monospace; font-size: 11px; background: #1e293b; color: #f8fafc; line-height: 1.4; padding: 15px; width: 100%; box-sizing: border-box; }
        button { padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-ghost { background: #64748b; color: white; }
        #status { padding: 15px; border-radius: 8px; font-weight: bold; text-align: center; margin-bottom: 15px; display: none; }
        .status-ok { background: #dcfce7; color: #166534; }
        .status-warn { background: #fef3c7; color: #92400e; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0; font-size: 1.5rem;">עורך נונוגרם 10.0 - מצב צביעה</h1>
        <div id="status"></div>
    </div>

    <div class="setup-bar">
        <div class="input-group"><label>ID</label><input type="number" id="lvl-id" value="21" style="width: 50px;" oninput="syncToCode()"></div>
        <div class="input-group"><label>שם</label><input type="text" id="lvl-name" value="אובייקט חדש" oninput="syncToCode()"></div>
        <div class="input-group"><label>W</label><input type="number" id="grid-w" value="15" style="width: 50px;" onchange="initGrid()"></div>
        <div class="input-group"><label>H</label><input type="number" id="grid-h" value="15" style="width: 50px;" onchange="initGrid()"></div>
        <button class="btn-success" onclick="runLogicalSolver()">בדוק פתירות</button>
        <button class="btn-ghost" onclick="initGrid()">איפוס</button>
    </div>

    <div class="editor-area">
        <div style="flex: 1.5;">
            <div id="grid-container"></div>
            <p style="color: #64748b; font-size: 0.85rem; margin-top: 10px;">לחץ וגרור כדי לצבוע | Ctrl+V להדבקת תמונה</p>
        </div>
        <div style="flex: 1;">
            <textarea id="code-output" spellcheck="false"></textarea>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn-ghost" style="flex:1" onclick="importFromCode()">ייבא קוד ↑</button>
                <button class="btn-primary" style="flex:1" onclick="copyCode()">העתק קוד</button>
            </div>
        </div>
    </div>
</div>

<script>
    let grid = [], w = 15, h = 15;
    let isDragging = false, dragType = 1;

    function initGrid() {
        w = parseInt(document.getElementById('grid-w').value);
        h = parseInt(document.getElementById('grid-h').value);
        grid = Array(h).fill().map(() => Array(w).fill(0));
        renderGrid();
    }

    function renderGrid() {
        const container = document.getElementById('grid-container');
        container.style.gridTemplateColumns = `repeat(${w}, 1fr)`;
        container.style.width = (w * 25 > 600) ? '600px' : (w * 25) + 'px';
        container.innerHTML = '';

        for (let r = 0; r < h; r++) {
            for (let c = 0; c < w; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell' + (grid[r][c] ? ' black' : '');
                cell.id = `cell-${r}-${c}`;
                
                cell.onmousedown = (e) => {
                    e.preventDefault();
                    isDragging = true;
                    dragType = grid[r][c] ? 0 : 1;
                    toggleCell(r, c, dragType);
                };
                
                cell.onmouseenter = () => {
                    if (isDragging) toggleCell(r, c, dragType);
                };

                container.appendChild(cell);
            }
        }
        syncToCode();
    }

    window.onmouseup = () => { isDragging = false; };

    function toggleCell(r, c, type) {
        grid[r][c] = type;
        const cell = document.getElementById(`cell-${r}-${c}`);
        if (type) cell.classList.add('black'); else cell.classList.remove('black');
        clearSolverMarks();
        syncToCode();
    }

    function syncToCode() {
        const id = document.getElementById('lvl-id').value;
        const name = document.getElementById('lvl-name').value;
        let gridLines = grid.map(row => `        [${row.join(',')}]`).join(',\n');
        document.getElementById('code-output').value = `{\n    id: ${id},\n    name: "${name}",\n    width: ${w},\n    height: ${h},\n    grid: [\n${gridLines}\n    ]\n},`;
    }

    function clearSolverMarks() {
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('solved-black', 'solved-x'));
        document.getElementById('status').style.display = 'none';
    }

    function importFromCode() {
        try {
            const raw = document.getElementById('code-output').value.trim();
            const obj = eval(`(${raw.endsWith(',') ? raw.slice(0, -1) : raw})`);
            if (obj.grid) { grid = obj.grid; h = grid.length; w = grid[0].length; }
            document.getElementById('lvl-id').value = obj.id || 0;
            document.getElementById('lvl-name').value = obj.name || "";
            document.getElementById('grid-w').value = w;
            document.getElementById('grid-h').value = h;
            renderGrid();
        } catch(e) { alert("שגיאה בייבוא"); }
    }

    function getClues(line) {
        const clues = line.join('').split('0').filter(s => s.length > 0).map(s => s.length);
        return clues.length ? clues : [0];
    }

    function solveLine(clues, current) {
        const len = current.length;
        const possibilities = [];
        function backtrack(idx, clueIdx, built) {
            if (clueIdx === clues.length) {
                const final = [...built, ...Array(len - built.length).fill(0)];
                if (final.every((v, i) => current[i] === null || current[i] === v)) possibilities.push(final);
                return;
            }
            const clue = clues[clueIdx];
            const gap = clues.slice(clueIdx + 1).reduce((a, b) => a + b + 1, 0);
            for (let s = idx; s <= len - gap - clue; s++) {
                const seg = [...Array(s - idx).fill(0), ...Array(clue).fill(1)];
                if (seg.length + built.length < len) seg.push(0);
                const combined = [...built, ...seg];
                if (combined.every((v, i) => current[i] === null || current[i] === v)) backtrack(combined.length, clueIdx + 1, combined);
            }
        }
        if (clues[0] === 0) possibilities.push(Array(len).fill(0)); else backtrack(0, 0, []);
        if (possibilities.length === 0) return null;
        const res = Array(len).fill(null);
        for (let i = 0; i < len; i++) {
            const f = possibilities[0][i];
            if (possibilities.every(p => p[i] === f)) res[i] = f;
        }
        return res;
    }

    function runLogicalSolver() {
        clearSolverMarks();
        const rClues = grid.map(r => getClues(r)), cClues = Array.from({length: w}, (_, i) => getClues(grid.map(r => r[i])));
        let sGrid = Array(h).fill().map(() => Array(w).fill(null)), changed = true, lim = 0;
        while (changed && lim < 40) {
            changed = false; lim++;
            rClues.forEach((clue, r) => {
                const res = solveLine(clue, sGrid[r]);
                if (res) res.forEach((v, c) => { if (v !== null && sGrid[r][c] === null) { sGrid[r][c] = v; changed = true; }});
            });
            cClues.forEach((clue, c) => {
                const res = solveLine(clue, sGrid.map(r => r[c]));
                if (res) res.forEach((v, r) => { if (v !== null && sGrid[r][c] === null) { sGrid[r][c] = v; changed = true; }});
            });
        }
        let solved = 0;
        sGrid.forEach((row, r) => row.forEach((v, c) => {
            if (v !== null) solved++;
            if (grid[r][c] === 0) {
                if (v === 1) document.getElementById(`cell-${r}-${c}`).classList.add('solved-black');
                if (v === 0) document.getElementById(`cell-${r}-${c}`).classList.add('solved-x');
            }
        }));
        const stat = document.getElementById('status'); stat.style.display = 'block';
        const p = Math.round((solved/(w*h))*100);
        stat.className = p === 100 ? 'status-ok' : 'status-warn';
        stat.innerText = p === 100 ? "✅ פתיר לוגית ב-100%!" : `⚠️ מחייב ניחוש: רק ${p}% וודאי.`;
    }

    function copyCode() { document.getElementById('code-output').select(); document.execCommand('copy'); alert("הועתק!"); }

    window.addEventListener('paste', e => {
        const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
        if (!item) return;
        const r = new FileReader(); r.onload = ev => {
            const img = new Image(); img.onload = () => {
                const cvs = document.createElement('canvas'); cvs.width = w; cvs.height = h;
                const ctx = cvs.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
                const d = ctx.getImageData(0, 0, w, h).data;
                for (let i = 0; i < d.length; i += 4) grid[Math.floor((i/4)/w)][(i/4)%w] = ((d[i]+d[i+1]+d[i+2])/3) < 128 ? 1 : 0;
                renderGrid();
            }; img.src = ev.target.result;
        }; r.readAsDataURL(item.getAsFile());
    });

    initGrid();
</script>
</body>
</html>
