<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>שחור ופתור - My Mind</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --primary: #000; --bg: #fff; --hint-bg: #f4f4f4; 
            --success-bg: #d4edda; --success-text: #155724;
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }
        * { touch-action: none; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg); margin: 0; display: flex; flex-direction: column; 
            align-items: center; height: 100vh; overflow: hidden;
        }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; }
        .active-screen { display: flex; }

        /* מסך פתיחה */
        #splash-screen { justify-content: center; background: #fff; z-index: 10000; }
        .logo-img { width: 150px; margin-bottom: 25px; }
        .loading-text { font-size: 1.5rem; color: #555; font-weight: 300; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* תפריט ראשי */
        .hero-section {
            width: 100%; height: 45%; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(to bottom, #f0f0f0, #fff); border-bottom: 1px solid #eee;
            overflow: hidden;
        }
        .main-char-sprite { 
            width: 160px; height: 220px;
            background-image: url('sprite1.jpg'); background-size: 480px 880px; 
            image-rendering: pixelated; transform: scale(1.6);
        }
        .levels-container {
            width: 100%; height: 55%; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .level-card { 
            width: 100%; max-width: 400px; border: 1.5px solid #000; padding: 18px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            background: #fff; border-radius: 12px;
        }
        .level-card.locked { opacity: 0.3; filter: grayscale(1); }

        /* לוח המשחק */
        #game-screen { padding: 10px; padding-top: calc(15px + env(safe-area-inset-top)); }
        .game-header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .game-container { display: grid; gap: 0px; background: #000; border: 2.5px solid #000; width: 100%; max-width: 450px; margin: auto; }
        .cell { background: #fff; aspect-ratio: 1/1; border: 0.1px solid #ddd; }
        .cell.black { background: #000 !important; }
        .cell.x-mark::after { content: "×"; font-size: 1.2rem; color: #bbb; display: flex; justify-content: center; align-items: center; height: 100%; }

        /* רמזים */
        .hint-cell { background-color: var(--hint-bg); font-size: 10px; font-weight: 900; color: #444; border: 0.1px solid #ccc; display: flex; align-items: center; justify-content: center; }
        .hint-completed { background-color: var(--success-bg) !important; color: var(--success-text) !important; }
        .thick-border-left { border-left: 2.5px solid #000 !important; }
        .thick-border-bottom { border-bottom: 2.5px solid #000 !important; }

        /* בקרים תחתונים */
        .controls-area {
            width: 100%; display: flex; justify-content: center; gap: 30px;
            padding-bottom: calc(var(--safe-bottom) + 50px); /* הגבהה משמעותית */
            padding-top: 20px;
        }
        .mode-btn { 
            width: 70px; height: 70px; border: 2.5px solid #000; background: #fff; 
            font-size: 2rem; border-radius: 15px; display: flex; align-items: center; justify-content: center; 
        }
        .mode-btn.active { background: #000; color: #fff; }
        .restart-btn { font-size: 1.4rem; background: #eee; border: 1px solid #ccc; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #555; }

        /* מודאל הודעות */
        #game-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; justify-content:center; align-items:center; }
        
        /* עיצוב מודאל רגיל (אישור אתחול) */
        .modal-content { 
            background:white; padding:30px; border-radius:25px; text-align:center; width:85%; max-width:320px; 
            border:4px solid #000; box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        /* עיצוב מודאל ניצחון - באנר תחתון שלא מסתיר את הגריד */
        #game-modal.win-modal { 
            background: transparent; 
            align-items: flex-end; /* נצמד לתחתית */
            pointer-events: none; /* מאפשר לראות דרכו, אך נבטל זאת עבור הכפתור */
        }
        #game-modal.win-modal .modal-content { 
            pointer-events: auto; /* מאפשר ללחוץ על הכפתור */
            width: 100%; max-width: 100%; border-radius: 25px 25px 0 0; border-bottom: none;
            padding: 20px; padding-bottom: calc(var(--safe-bottom) + 20px);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.2); transform: translateY(0);
        }
    </style>
</head>
<body>

    <div id="splash-screen" class="screen active-screen">
        <img src="logo1.png" class="logo-img">
        <div class="loading-text">טוען את המוח...</div>
    </div>

    <div id="main-menu" class="screen">
        <div class="hero-section"><div id="hero-sprite" class="main-char-sprite"></div></div>
        <div class="levels-container" id="levels-container"></div>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-header">
            <button onclick="exitGame()" style="background:none; border:none; font-size: 2.5rem; cursor:pointer;">✕</button>
            <div id="level-title-display" style="font-weight:bold; font-size:1.2rem;"></div>
            <button onclick="confirmReset()" class="restart-btn">🔄</button>
        </div>
        <div id="game-board" class="game-container"></div>
        <div id="timer-display" style="margin-top:10px; font-family:monospace; font-size:1.1rem;">00:00</div>
        <div class="controls-area">
            <button id="btn-paint" class="mode-btn active">⬛</button>
            <button id="btn-x" class="mode-btn">×</button>
        </div>
    </div>

    <div id="game-modal">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <p id="modal-message"></p>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button id="modal-confirm-btn" onclick="modalPrimaryAction()" style="flex:1; background:#000; color:#fff; border:none; padding:15px; border-radius:12px; font-weight:bold; cursor:pointer;">המשך</button>
                <button id="modal-cancel-btn" onclick="hideModalOnly()" style="display:none; flex:1; background:#eee; border:none; padding:15px; border-radius:12px; color:#555; cursor:pointer;">ביטול</button>
            </div>
        </div>
    </div>

    <script src="levels.js"></script>
    <script src="engine.js"></script>
    <script>
        const PROGRESS_KEY = 'nonogram_v1_progress';
        const STATE_KEY = 'nonogram_v1_current_state';
        let currentLevelId, currentSolution, currentMode = 'paint', cells = [], isDragging = false;
        let isWinModal = false, pendingReset = false;

        function getProgress() { return JSON.parse(localStorage.getItem(PROGRESS_KEY)) || { completedIds: [] }; }
        function saveWin(id) {
            let p = getProgress();
            if (!p.completedIds.includes(id)) { p.completedIds.push(id); localStorage.setItem(PROGRESS_KEY, JSON.stringify(p)); }
            localStorage.removeItem(STATE_KEY);
        }
        function saveBoardState() {
            const state = cells.map(row => row.map(c => c.classList.contains('black') ? 1 : (c.classList.contains('x-mark') ? -1 : 0)));
            localStorage.setItem(STATE_KEY, JSON.stringify({ id: currentLevelId, board: state }));
        }
        function loadBoardState() {
            const saved = JSON.parse(localStorage.getItem(STATE_KEY));
            return (saved && saved.id === currentLevelId) ? saved.board : null;
        }

        function updateHeroVisual(count) {
            const sprite = document.getElementById('hero-sprite');
            const idx = Math.min(Math.floor(count / 5), 11);
            sprite.style.backgroundPosition = `-${(idx % 3) * 160}px -${Math.floor(idx / 3) * 220}px`;
        }

        function showWinModal(title, msg) {
            isWinModal = true; pendingReset = false;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = msg;
            document.getElementById('modal-cancel-btn').style.display = 'none';
            document.getElementById('game-modal').classList.add('win-modal');
            document.getElementById('game-modal').style.display = 'flex';
        }

        function confirmReset() {
            isWinModal = false; pendingReset = true;
            document.getElementById('modal-title').innerText = "אתחול שלב";
            document.getElementById('modal-message').innerText = "האם למחוק את כל ההתקדמות בשלב הזה?";
            document.getElementById('modal-cancel-btn').style.display = 'block';
            document.getElementById('game-modal').classList.remove('win-modal');
            document.getElementById('game-modal').style.display = 'flex';
        }

        function modalPrimaryAction() {
            if (isWinModal) {
                exitGame();
            } else if (pendingReset) {
                localStorage.removeItem(STATE_KEY);
                initBoard();
            }
            hideModalOnly();
        }

        function hideModalOnly() { 
            document.getElementById('game-modal').style.display = 'none';
            pendingReset = false;
        }

        function initBoard() {
            const board = document.getElementById('game-board');
            const size = currentSolution.length;
            board.style.gridTemplateColumns = `55px repeat(${size}, 1fr)`;
            board.innerHTML = ''; cells = [];
            const data = generateNonogramData(currentSolution);
            const savedData = loadBoardState();

            board.appendChild(Object.assign(document.createElement('div'), {className: 'hint-cell thick-border-bottom thick-border-left'}));
            data.colHints.forEach((h, i) => {
                const d = document.createElement('div');
                d.className = `hint-cell thick-border-bottom ${(i+1)%5===0 ? 'thick-border-left' : ''}`;
                d.id = `col-hint-${i}`; d.style.flexDirection = 'column'; d.style.justifyContent = 'flex-end';
                d.innerHTML = h.join('<br>'); board.appendChild(d);
            });

            for (let r = 0; r < size; r++) {
                const rh = document.createElement('div');
                rh.className = `hint-cell thick-border-left ${(r+1)%5===0 ? 'thick-border-bottom' : ''}`;
                rh.id = `row-hint-${r}`; rh.innerText = data.rowHints[r].join(', ');
                board.appendChild(rh);
                cells[r] = [];
                for (let c = 0; c < size; c++) {
                    const cell = document.createElement('div');
                    cell.className = `cell ${(c+1)%5===0 ? 'thick-border-left' : ''} ${(r+1)%5===0 ? 'thick-border-bottom' : ''}`;
                    if(savedData) {
                        if(savedData[r][c] === 1) cell.classList.add('black');
                        if(savedData[r][c] === -1) cell.classList.add('x-mark');
                    }
                    cell.onpointerdown = (e) => { isDragging = true; cell.releasePointerCapture(e.pointerId); handleAction(r, c); };
                    cell.onpointerenter = () => { if (isDragging) handleAction(r, c); };
                    board.appendChild(cell);
                    cells[r][c] = cell;
                }
            }
            window.onpointerup = () => isDragging = false;
            updateHintsUI();
            startTimer();
        }

        function handleAction(r, c) {
            const cell = cells[r][c];
            if (currentMode === 'paint') {
                if (!cell.classList.contains('x-mark')) cell.classList.toggle('black');
            } else {
                if (!cell.classList.contains('black')) cell.classList.toggle('x-mark');
            }
            saveBoardState(); updateHintsUI(); checkWinStatus();
        }

        function updateHintsUI() {
            const data = generateNonogramData(currentSolution);
            for (let i = 0; i < currentSolution.length; i++) {
                const rowSeq = getSeq(cells[i].map(c => c.classList.contains('black') ? 1 : 0));
                const rEl = document.getElementById(`row-hint-${i}`);
                if (rEl) rEl.className = `hint-cell thick-border-left ${(i+1)%5===0 ? 'thick-border-bottom' : ''} ${JSON.stringify(rowSeq)===JSON.stringify(data.rowHints[i]) ? 'hint-completed' : ''}`;
                const colSeq = getSeq(cells.map(row => row[i].classList.contains('black') ? 1 : 0));
                const cEl = document.getElementById(`col-hint-${i}`);
                if (cEl) cEl.className = `hint-cell thick-border-bottom ${(i+1)%5===0 ? 'thick-border-left' : ''} ${JSON.stringify(colSeq)===JSON.stringify(data.colHints[i]) ? 'hint-completed' : ''}`;
            }
        }

        function getSeq(arr) { return arr.join('').split('0').filter(s => s.length > 0).map(s => s.length); }

        function checkWinStatus() {
            const cur = cells.map(r => r.map(c => c.classList.contains('black') ? 1 : 0));
            if (checkWin(currentSolution, cur)) {
                stopTimer(); saveWin(currentLevelId);
                setTimeout(() => showWinModal("פיצחת את המוח!", "האתגר הושלם בהצלחה 🎉"), 400);
            }
        }

        function renderMainMenu() {
            const container = document.getElementById('levels-container');
            container.innerHTML = '';
            const progress = getProgress();
            updateHeroVisual(progress.completedIds.length);
            allLevels.forEach((level, i) => {
                const solved = progress.completedIds.includes(level.id);
                const unlocked = i === 0 || progress.completedIds.includes(allLevels[i-1].id);
                const div = document.createElement('div');
                div.className = `level-card ${!unlocked ? 'locked' : ''}`;
                div.innerHTML = `<div><b>${level.id}. ${level.name}</b></div><div>${solved?'✅':(unlocked?'◀':'🔒')}</div>`;
                if (unlocked) div.onclick = () => {
                    currentLevelId = level.id; currentSolution = getLevelGrid(level);
                    document.getElementById('level-title-display').innerText = level.name;
                    showScreen('game-screen'); initBoard();
                };
                container.appendChild(div);
            });
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        function exitGame() { stopTimer(); showScreen('main-menu'); renderMainMenu(); }

        document.getElementById('btn-paint').onclick = () => { currentMode = 'paint'; document.getElementById('btn-paint').classList.add('active'); document.getElementById('btn-x').classList.remove('active'); };
        document.getElementById('btn-x').onclick = () => { currentMode = 'x'; document.getElementById('btn-x').classList.add('active'); document.getElementById('btn-paint').classList.remove('active'); };

        window.onload = () => { setTimeout(() => { showScreen('main-menu'); renderMainMenu(); }, 3000); };
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => {}); }
        setInterval(() => {
            if(document.getElementById('game-screen').classList.contains('active-screen')) {
                document.getElementById('timer-display').innerText = formatTime(elapsedTime);
            }
        }, 1000);
    </script>
</body>
</html>
