<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>שחור ופתור - My Mind</title>
    <style>
        :root { --primary: #000; --bg: #fff; --hint-bg: #f4f4f4; --success-bg: #d4edda; --success-text: #155724; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center;
            user-select: none; -webkit-tap-highlight-color: transparent; overflow-x: hidden; touch-action: none;
        }

        .screen { display: none; width: 100%; min-height: 100vh; flex-direction: column; align-items: center; padding: 15px; box-sizing: border-box; }
        .active-screen { display: flex; }

        /* תפריט שלבים */
        #main-menu { padding: 20px 10px; flex-direction: row; justify-content: center; align-items: flex-start; gap: 15px; }
        .levels-list { flex-grow: 1; max-width: 400px; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .level-card { 
            width: 95%; max-width: 400px; box-sizing: border-box; border: 1.5px solid #000; padding: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; background: #fff; border-radius: 8px;
        }
        .level-card.locked { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }

        /* לוח המשחק */
        .game-container { display: grid; gap: 0px; background: #000; border: 2.5px solid #000; width: 100%; max-width: 500px; }
        .cell { background: #fff; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; border: 0.1px solid #ddd; box-sizing: border-box; }
        .cell.black { background: #000 !important; }
        .cell.x-mark::after { content: "×"; font-size: 1.5rem; color: #bbb; }
        .cell.error-mark { color: #ff4d4d; font-size: 1.2rem; font-weight: bold; }

        /* רמזים */
        .hint-cell { background-color: var(--hint-bg); font-size: 10px; font-weight: 900; color: #444; border: 0.1px solid #ccc; display: flex; align-items: center; justify-content: center; transition: background 0.3s; }
        .hint-completed { background-color: var(--success-bg) !important; color: var(--success-text) !important; }
        
        .thick-border-left { border-left: 2.5px solid #000 !important; }
        .thick-border-bottom { border-bottom: 2.5px solid #000 !important; }

        /* מודאל */
        #game-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center; }
        .modal-content { background:white; padding:30px; border-radius:20px; text-align:center; width:80%; max-width:300px; border:3px solid #000; }

        .controls { margin-top: 25px; display: flex; gap: 20px; }
        .mode-btn { width: 65px; height: 65px; border: 2px solid #000; background: #fff; font-size: 1.8rem; cursor: pointer; border-radius: 12px; }
        .mode-btn.active { background: #000; color: #fff; }
    </style>
</head>
<body>

    <div id="main-menu" class="screen active-screen">
        <div class="levels-list" id="levels-container"></div>
    </div>

    <div id="game-screen" class="screen">
        <div style="width:100%; display:flex; justify-content:space-between; margin-bottom:15px;">
            <button onclick="exitGame()" style="background:none; border:none; font-size: 1.8rem;">✕</button>
            <div id="lives-container">❤️❤️❤️</div>
        </div>
        <div id="game-board" class="game-container"></div>
        <div class="controls">
            <button id="btn-paint" class="mode-btn active">⬛</button>
            <button id="btn-x" class="mode-btn">×</button>
        </div>
    </div>

    <div id="game-modal">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <p id="modal-message"></p>
            <button onclick="closeModal()" style="background:#000; color:#fff; border:none; padding:12px 25px; border-radius:10px; width:100%; font-weight:bold;">המשך</button>
        </div>
    </div>

    <script src="levels.js"></script>
    <script src="engine.js"></script>
    <script>
        let currentLevelId, currentSolution, currentMode = 'paint', cells = [], lives = 3, isDragging = false;

        function showModal(t, m) {
            document.getElementById('modal-title').innerText = t;
            document.getElementById('modal-message').innerText = m;
            document.getElementById('game-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('game-modal').style.display = 'none';
            exitGame();
        }

        function initBoard() {
            const board = document.getElementById('game-board');
            const size = currentSolution.length;
            board.style.gridTemplateColumns = `55px repeat(${size}, 1fr)`;
            board.innerHTML = ''; cells = [];
            const data = generateNonogramData(currentSolution);

            board.appendChild(Object.assign(document.createElement('div'), {className: 'hint-cell thick-border-bottom thick-border-left'}));
            
            data.colHints.forEach((h, i) => {
                const d = document.createElement('div');
                d.className = `hint-cell thick-border-bottom ${(i+1)%5===0 ? 'thick-border-left' : ''}`;
                d.id = `col-hint-${i}`;
                d.style.flexDirection = 'column'; d.style.justifyContent = 'flex-end';
                d.innerHTML = h.join('<br>');
                board.appendChild(d);
            });

            for (let r = 0; r < size; r++) {
                const rh = document.createElement('div');
                rh.className = `hint-cell thick-border-left ${(r+1)%5===0 ? 'thick-border-bottom' : ''}`;
                rh.id = `row-hint-${r}`;
                rh.innerText = data.rowHints[r].join(', ');
                board.appendChild(rh);
                
                cells[r] = [];
                for (let c = 0; c < size; c++) {
                    const cell = document.createElement('div');
                    cell.className = `cell ${(c+1)%5===0 ? 'thick-border-left' : ''} ${(r+1)%5===0 ? 'thick-border-bottom' : ''}`;
                    cell.dataset.r = r; cell.dataset.c = c;
                    
                    cell.onpointerdown = (e) => { isDragging = true; cell.releasePointerCapture(e.pointerId); handleCellClick(r, c); };
                    cell.onpointerenter = () => { if (isDragging) handleCellClick(r, c); };
                    
                    board.appendChild(cell);
                    cells[r][c] = cell;
                }
            }
            window.onpointerup = () => isDragging = false;
        }

        function handleCellClick(r, c) {
            const cell = cells[r][c];
            if (cell.classList.contains('error-mark')) return;

            if (currentMode === 'paint') {
                if (cell.classList.contains('black')) return;
                if (cell.classList.contains('x-mark')) return;

                if (currentSolution[r][c] === 1) {
                    cell.classList.add('black');
                    updateHintsUI(r, c);
                    checkWinStatus();
                } else {
                    cell.classList.add('error-mark'); cell.innerText = 'X';
                    lives--; updateLivesUI();
                    if (lives <= 0) showModal("אופס...", "נגמרו הלבבות! נסה שוב 💔");
                }
            } else {
                if (!cell.classList.contains('black')) cell.classList.toggle('x-mark');
            }
        }

        function updateHintsUI(r, c) {
            const size = currentSolution.length;
            const data = generateNonogramData(currentSolution);

            // בדיקת שורה
            const rowSeq = getSeq(cells[r].map(cell => cell.classList.contains('black') ? 1 : 0));
            document.getElementById(`row-hint-${r}`).className = `hint-cell thick-border-left ${(r+1)%5===0 ? 'thick-border-bottom' : ''} ${JSON.stringify(rowSeq) === JSON.stringify(data.rowHints[r]) ? 'hint-completed' : ''}`;

            // בדיקת עמודה
            const colCells = [];
            for(let i=0; i<size; i++) colCells.push(cells[i][c].classList.contains('black') ? 1 : 0);
            const colSeq = getSeq(colCells);
            document.getElementById(`col-hint-${c}`).className = `hint-cell thick-border-bottom ${(c+1)%5===0 ? 'thick-border-left' : ''} ${JSON.stringify(colSeq) === JSON.stringify(data.colHints[c]) ? 'hint-completed' : ''}`;
        }

        function getSeq(arr) { return arr.join('').split('0').filter(s => s.length > 0).map(s => s.length); }

        function checkWinStatus() {
            const cur = cells.map(r => r.map(c => c.classList.contains('black') ? 1 : 0));
            if (checkWin(currentSolution, cur)) showModal("כל הכבוד!", "פתרת את השלב בהצלחה! 🎉");
        }

        function startLevel(level) {
            lives = 3; updateLivesUI();
            currentLevelId = level.id;
            currentSolution = getLevelGrid(level);
            document.getElementById('main-menu').classList.remove('active-screen');
            document.getElementById('game-screen').classList.add('active-screen');
            initBoard();
        }

        function exitGame() { 
            document.getElementById('game-screen').classList.remove('active-screen');
            document.getElementById('main-menu').classList.add('active-screen');
            renderMainMenu(); 
        }

        function updateLivesUI() { document.getElementById('lives-container').innerText = "❤️".repeat(lives) + "🖤".repeat(3-lives); }

        function renderMainMenu() {
            const container = document.getElementById('levels-container');
            container.innerHTML = '';
            allLevels.forEach((level, i) => {
                const div = document.createElement('div');
                div.className = 'level-card';
                div.innerHTML = `<div><b>${level.id}. ${level.name}</b></div><div>◀</div>`;
                div.onclick = () => startLevel(level);
                container.appendChild(div);
            });
        }

        document.getElementById('btn-paint').onclick = () => { currentMode = 'paint'; document.getElementById('btn-paint').classList.add('active'); document.getElementById('btn-x').classList.remove('active'); };
        document.getElementById('btn-x').onclick = () => { currentMode = 'x'; document.getElementById('btn-x').classList.add('active'); document.getElementById('btn-paint').classList.remove('active'); };

        window.onload = renderMainMenu;
    </script>
</body>
</html>
