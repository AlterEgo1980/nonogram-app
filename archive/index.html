<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>My Mind - פלטפורמת משחקים</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --primary: #000; --bg: #fff; --hint-bg: #f4f4f4; 
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --hint-solved: #dcfce7;
        }
        * { touch-action: pan-y; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg); margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; 
            height: 100dvh; overflow: hidden;
        }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; overflow: hidden; }
        .active-screen { display: flex; }

        /* Splash Screen */
        #splash-screen { justify-content: center; background: #fff; }
        .logo-img { width: 120px; margin-bottom: 25px; }

        /* HUB Screen */
        #hub-screen { background: #f9f9f9; padding-top: 50px; }
        .hub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; width: 100%; max-width: 500px; }
        .hub-item { background: #fff; border: 3px solid #000; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 4px 0 #000; }
        .hub-item:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }
        .hub-item.locked { border-color: #ccc; box-shadow: 0 4px 0 #ccc; color: #aaa; }

        /* Nonogram Styles */
        .hero-section { width: 100%; height: 35%; display: flex; justify-content: center; align-items: center; background: #fff; border-bottom: 1px solid #eee; flex-shrink: 0; }
        .main-char-sprite { width: 160px; height: 220px; background-image: url('sprite1.jpg'); background-size: 480px 880px; image-rendering: pixelated; transform: scale(1.1); }
        .levels-container { width: 100%; flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .level-card { width: 100%; max-width: 380px; border: 2px solid #000; padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #fff; border-radius: 14px; }
        .game-container { display: grid; background: #000; border: 2.5px solid #000; width: 95vw; max-width: 450px; margin: auto; }
        .cell { background: #fff; aspect-ratio: 1/1; border: 0.1px solid #ddd; position: relative; }
        .cell.black { background: #000 !important; }
        .cell.x-mark::after { content: "×"; font-size: 1.2rem; color: #bbb; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .hint-cell { background-color: var(--hint-bg); font-size: 10px; font-weight: 900; border: 0.1px solid #ccc; display: flex; align-items: center; justify-content: center; text-align: center; }
        .hint-cell.solved { background-color: var(--hint-solved) !important; color: #166534; }
        .thick-border-left { border-left: 2.5px solid #000 !important; }
        .thick-border-bottom { border-bottom: 2.5px solid #000 !important; }
        
        .mode-btn { width: 70px; height: 70px; border: 2.5px solid #000; background: #fff; font-size: 2rem; border-radius: 18px; }
        .mode-btn.active { background: #000; color: #fff; }
#game-modal { 
    display:none; 
    position:fixed; 
    top:0; 
    left:0; 
    width:100%; 
    height:100%; 
    z-index:10000; /* זה יוודא שההודעה תקפוץ מעל הכל */
    justify-content:center; 
    align-items:center; 
    background: rgba(0,0,0,0.7); /* רקע כהה שקוף */
}
        .modal-content { background:white; padding:30px; border-radius:25px; text-align:center; width:85%; max-width:320px; border:4px solid #000; }
    </style>
</head>
<body>

    <div id="splash-screen" class="screen active-screen">
        <img src="logo1.png" class="logo-img">
        <div style="font-size: 1.2rem;">טוען את המוח...</div>
    </div>

    <div id="hub-screen" class="screen">
        <h1 style="margin: 40px 0 20px;">הספרייה שלי</h1>
        <div class="hub-grid">
            <div class="hub-item" onclick="openNonogram()">
                <div style="font-size: 3rem;">⬛</div>
                <div style="font-weight: bold; margin-top: 10px;">נונוגרם</div>
            </div>
            <div class="hub-item locked">
                <div style="font-size: 3rem;">🃏</div>
                <div style="font-weight: bold; margin-top: 10px;">זיכרון</div>
            </div>
        </div>
    </div>

    <div id="main-menu" class="screen">
        <div class="hero-section">
            <div id="hero-sprite" class="main-char-sprite" onclick="triggerDevMode()"></div>
        </div>
        <div style="width: 100%; padding: 15px; display: flex; justify-content: space-between; align-items: center;">
            <button onclick="showScreen('hub-screen')" style="background:none; border:none; font-size: 1.2rem; font-weight: bold;">⬅ חזרה</button>
            <h2 style="margin:0;">שלבי נונוגרם</h2>
        </div>
        <div class="levels-container" id="levels-container"></div>
    </div>

    <div id="game-screen" class="screen">
        <div style="width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px;">
            <button onclick="exitGame()" style="background:none; border:none; font-size: 2rem;">✕</button>
            <div id="level-title-display" style="font-weight:bold;"></div>
            <button onclick="confirmReset()" style="background:#eee; border:none; width:40px; height:40px; border-radius:50%;">🔄</button>
        </div>
        <div id="game-board" class="game-container"></div>
        <div id="timer-display" style="margin: 10px 0; font-family:monospace; font-size:1.2rem;">00:00</div>
        <div style="display: flex; gap: 20px; padding-bottom: 40px;">
            <button id="btn-paint" class="mode-btn active">⬛</button>
            <button id="btn-x" class="mode-btn">×</button>
        </div>
    </div>

    <div id="game-modal">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <p id="modal-message"></p>
            <button onclick="modalPrimaryAction()" style="width:100%; background:#000; color:#fff; border:none; padding:15px; border-radius:12px; font-weight:bold; margin-top:15px;">המשך</button>
        </div>
    </div>

    <script src="levels.js"></script>
    <script src="engine.js"></script>
    <script>
        const APP_VERSION = '1.1'; 
        const PROGRESS_KEY = 'nonogram_v1_progress';
        const STATE_KEY = 'nonogram_v1_current_state';
        let currentLevelId, currentSolution, currentMode = 'paint', cells = [], isDragging = false;
        let rowHintElements = [], colHintElements = [];
        let devClickCount = 0, devModeActive = false;

        function checkUpdates() {
            const lastVersion = localStorage.getItem('app_version');
            if (lastVersion && lastVersion !== APP_VERSION) {
                localStorage.setItem('app_version', APP_VERSION);
                location.reload(true);
            } else { localStorage.setItem('app_version', APP_VERSION); }
        }
        checkUpdates();

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        function openNonogram() { showScreen('main-menu'); renderMainMenu(); }

        function triggerDevMode() {
            devClickCount++;
            if (devClickCount === 8) { devModeActive = true; alert("Dev Mode: Click Level 2 (Turtle) to unlock all."); }
        }

        function getProgress() { return JSON.parse(localStorage.getItem(PROGRESS_KEY)) || { completedIds: [] }; }

        function renderMainMenu() {
            const container = document.getElementById('levels-container');
            container.innerHTML = '';
            const progress = getProgress();
            
            const sprite = document.getElementById('hero-sprite');
            const heroIdx = Math.min(Math.floor(progress.completedIds.length / 5), 11);
            sprite.style.backgroundPosition = `-${(heroIdx % 3) * 160}px -${Math.floor(heroIdx / 3) * 220}px`;

            let currentIndex = allLevels.findIndex(l => !progress.completedIds.includes(l.id));
            if (currentIndex === -1) currentIndex = allLevels.length - 1;

            allLevels.slice(0, currentIndex + 2).forEach((level, i) => {
                const unlocked = i <= currentIndex;
                const solved = progress.completedIds.includes(level.id);
                const div = document.createElement('div');
                div.className = `level-card ${!unlocked ? 'locked' : ''}`;
                div.innerHTML = `<div><b>${level.id}. ${level.name}</b></div><div>${solved ? '✅' : (unlocked ? '◀' : '🔒')}</div>`;
                
                if (unlocked || (devModeActive && i === 1)) {
                    div.onclick = () => {
                        if (devModeActive && i === 1) {
                            const p = getProgress();
                            allLevels.forEach(l => { if(!p.completedIds.includes(l.id)) p.completedIds.push(l.id); });
                            localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
                            devModeActive = false; renderMainMenu(); return;
                        }
                        currentLevelId = level.id;
                        currentSolution = getLevelGrid(level);
                        document.getElementById('level-title-display').innerText = level.name;
                        showScreen('game-screen');
                        initBoard();
                    };
                }
                container.appendChild(div);
            });
        }

function initBoard() {
    stopTimer(); 
    elapsedTime = 0;
    const board = document.getElementById('game-board');
    if (!currentSolution) return; // הגנה למקרה שהשלב לא נטען

    const numRows = currentSolution.length;
    const numCols = currentSolution[0].length;
    
    // הגדרת הגריד לפי מידות השלב
    board.style.gridTemplateColumns = `55px repeat(${numCols}, 1fr)`;
    board.innerHTML = ''; 
    cells = []; rowHintElements = []; colHintElements = [];
    
    const data = generateNonogramData(currentSolution);
    // טעינת מצב שמור רק אם זה אותו שלב
    const saved = JSON.parse(localStorage.getItem(STATE_KEY));
    const savedData = (saved && saved.id === currentLevelId) ? saved.board : null;

    // פינה ריקה
    board.appendChild(Object.assign(document.createElement('div'), {className: 'hint-cell thick-border-bottom thick-border-left'}));
    
    // רמזי עמודות
    data.colHints.forEach((h, i) => {
        const d = document.createElement('div');
        d.className = `hint-cell thick-border-bottom ${(i+1)%5===0 ? 'thick-border-left' : ''}`;
        d.innerHTML = h.join('<br>');
        board.appendChild(d);
        colHintElements[i] = d;
    });

    // יצירת שורות ותאים
    for (let r = 0; r < numRows; r++) {
        const rh = document.createElement('div');
        rh.className = `hint-cell thick-border-left ${(r+1)%5===0 ? 'thick-border-bottom' : ''}`;
        rh.innerText = data.rowHints[r].join(', ');
        board.appendChild(rh);
        rowHintElements[r] = rh;
        
        cells[r] = [];
        for (let c = 0; c < numCols; c++) {
            const cell = document.createElement('div');
            cell.className = `cell ${(c+1)%5===0 ? 'thick-border-left' : ''} ${(r+1)%5===0 ? 'thick-border-bottom' : ''}`;
            
            // שחזור מצב שמור
            if(savedData && savedData[r] && savedData[r][c] === 1) cell.classList.add('black');
            if(savedData && savedData[r] && savedData[r][c] === -1) cell.classList.add('x-mark');
            
            cell.onpointerdown = (e) => { 
                isDragging = true; 
                cell.releasePointerCapture(e.pointerId); 
                handleAction(r, c); 
            };
            cell.onpointerenter = () => { if (isDragging) handleAction(r, c); };
            board.appendChild(cell);
            cells[r][c] = cell;
        }
    }
    updateHintColors();
    startTimer();
}

        function handleAction(r, c) {
            const cell = cells[r][c];
            if (currentMode === 'paint') {
                if (cell.classList.contains('x-mark')) cell.classList.remove('x-mark');
                cell.classList.toggle('black');
            } else {
                if (cell.classList.contains('black')) cell.classList.remove('black');
                cell.classList.toggle('x-mark');
            }
            const state = cells.map(row => row.map(c => c.classList.contains('black') ? 1 : (c.classList.contains('x-mark') ? -1 : 0)));
            localStorage.setItem(STATE_KEY, JSON.stringify({ id: currentLevelId, board: state }));
            updateHintColors();
            checkWinStatus();
        }

        function updateHintColors() {
            const data = generateNonogramData(currentSolution);
            cells.forEach((row, r) => {
                const rowValues = row.map(c => c.classList.contains('black') ? 1 : 0);
                const hints = rowValues.join('').split('0').filter(s => s.length > 0).map(s => s.length);
                const finalHints = hints.length ? hints : [0];
                rowHintElements[r].classList.toggle('solved', JSON.stringify(finalHints) === JSON.stringify(data.rowHints[r]));
            });
            for (let c = 0; c < currentSolution[0].length; c++) {
                const colValues = cells.map(r => r[c].classList.contains('black') ? 1 : 0);
                const hints = colValues.join('').split('0').filter(s => s.length > 0).map(s => s.length);
                const finalHints = hints.length ? hints : [0];
                colHintElements[c].classList.toggle('solved', JSON.stringify(finalHints) === JSON.stringify(data.colHints[c]));
            }
        }

function checkWinStatus() {
    // 1. יצירת מטריצה מהמצב הנוכחי
    const cur = cells.map(r => r.map(c => c.classList.contains('black') ? 1 : 0));
    
    // 2. בדיקה אם הפתרון נכון
    if (checkWin(currentSolution, cur)) {
        console.log("Win detected!"); // לבדיקה ב-Console
        stopTimer(); 
        
        // 3. הצגת המודאל מיד (לפני שמירה או לוגיקה כבדה)
        const modal = document.getElementById('game-modal');
        document.getElementById('modal-title').innerText = "פיצחת את המוח!";
        document.getElementById('modal-message').innerText = "האתגר הושלם בהצלחה 🎉";
        modal.style.display = 'flex';
        modal.style.zIndex = "10000"; // וידוא שהוא מעל הכל

        // 4. שמירת התקדמות (בתוך try-catch כדי שלא ישבור את התצוגה)
        try {
            saveWin(currentLevelId);
        } catch (e) {
            console.error("Error saving progress:", e);
        }
    }
}

        function modalPrimaryAction() { document.getElementById('game-modal').style.display = 'none'; exitGame(); }
        function confirmReset() { if(confirm("לאתחל את השלב?")) { localStorage.removeItem(STATE_KEY); initBoard(); } }
        function exitGame() { stopTimer(); showScreen('main-menu'); renderMainMenu(); }

        window.onload = () => { setTimeout(() => { showScreen('hub-screen'); }, 2500); };
        window.onpointerup = () => isDragging = false;
        document.getElementById('btn-paint').onclick = () => { currentMode = 'paint'; document.getElementById('btn-paint').classList.add('active'); document.getElementById('btn-x').classList.remove('active'); };
        document.getElementById('btn-x').onclick = () => { currentMode = 'x'; document.getElementById('btn-x').classList.add('active'); document.getElementById('btn-paint').classList.remove('active'); };
        setInterval(() => { if(document.getElementById('game-screen').classList.contains('active-screen')) document.getElementById('timer-display').innerText = formatTime(elapsedTime); }, 1000);
    </script>
</body>
</html>
